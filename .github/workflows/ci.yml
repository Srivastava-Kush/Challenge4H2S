name: StadiumIQ CI Quality Gates

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: TypeScript Build Check
        run: npm run build

      - name: Backend Unit & Security Tests
        run: npm --workspace=backend run test -- --coverage
        env:
          GEMINI_API_KEY: ""

      - name: Enforce Coverage Thresholds
        run: echo "Coverage thresholds enforced by Vitest config."

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start Backend
        run: |
          npm --workspace=backend run start > backend.log 2>&1 &
          sleep 10

      - name: Verify Backend
        run: |
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:5000/api/map

      - name: Frontend Axe Accessibility & E2E Tests
        run: npm --workspace=frontend run test:e2e
        env:
          CI: "true"
          GEMINI_API_KEY: ""

      - name: Upload Backend Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log